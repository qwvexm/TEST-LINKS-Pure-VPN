name: Update VPN Subscription

on:
  schedule:
    - cron: '0 * * * *'    # каждый час
  workflow_dispatch: {}      # позволяет запустить руками из вкладки Actions

permissions:
  contents: write

jobs:
  update-subscription:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build and encode subscription
        run: |
          set -e

          HEADER='#profile-update-interval: 1
#hide-settings: 1
#profile-title: 🪐 Pure VPN | ТЕСТ
#subscription-userinfo: expire=1782853200
#support-url: https://pure-vpn.qwvexm.ru
#announce: base64:4oS577iPINCi0LXRgdGC0L7QstGL0LUg0YHQtdGA0LLQtdGA0LAKCnB1cmUtdnBuLnF3dmV4bS5ydQ=='

          SITE1_URL="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          SITE2_URL="https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt"

          SITE1_LINES=$(curl -fsSL "$SITE1_URL" | sed -n '5,34p')
          SITE2_LINES=$(curl -fsSL "$SITE2_URL" | sed -n '5,34p')

          # склеиваем: заголовок + 30 строк с 1 сайта + 30 строк со 2 сайта
          FULL_CONTENT=$(printf '%s\n%s\n%s\n' "$HEADER" "$SITE1_LINES" "$SITE2_LINES")

          # кодируем всё содержимое в base64 (одной строкой, без разрывов)
          echo "$FULL_CONTENT" | base64 -w 0 > subscription.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update subscription file"
            git push
          else
            echo "No changes, skipping commit"
          fi
