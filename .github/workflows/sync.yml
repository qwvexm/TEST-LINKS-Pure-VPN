name: Test Link

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Step 1
      uses: actions/checkout@v4

    - name: Step 2
      run: |
        echo "#profile-update-interval: 1" > links.txt
        echo "#hide-settings: 1" >> links.txt
        echo "#profile-title: 🪐 Pure VPN | ТЕСТ" >> links.txt
        echo "#profile-web-page-url: https://qwvexm.ru" >> links.txt
        echo "#announce: base64:4oS577iPINCt0YLQviDRgtC10YHRgtC+0LLRi9C5INGB0LXRgNCy0LXRgCwg0YHQtdGA0LLQtdGA0LAg0LHRg9C00YPRgiDQvtCx0L3QvtCy0LvRj9GC0YzRgdGPINC60LDQttC00YvQuSDRh9Cw0YEu" >> links.txt
        curl -sL "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" | tail -n +5 | head -n 31 | base64 -w 0 >> links.txt

    - name: Step 3
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add links.txt
        git diff-index --quiet HEAD || git commit -m "Automated links update [skip ci]"
        git push
