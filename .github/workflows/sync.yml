name: Hourly Link Update

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Download, filter live nodes and encode
      run: |
        echo "#profile-update-interval: 1" > temp.txt
        echo "#hide-settings: 1" >> temp.txt
        echo "#profile-title: 🪐 Pure VPN | ТЕСТ" >> temp.txt
        echo "#profile-web-page-url: https://pure-vpn.qwvexm.ru" >> temp.txt
        echo "#announce: base64:4oS577iPINCt0YLQviDRgtC10YHRgtC+0LLRi9C5INGB0LXRgNCy0LXRgCwg0YHQtdGA0LLQtdGA0LAg0LHRg9C00YPRgiDQvtCx0L3QvtCy0LvRj9GC0YzRgdGPINC60LDQttC00YvQuSDRh9Cw0YEu" >> temp.txt
        
        curl -sL "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" > raw_links.txt
        curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" >> raw_links.txt
        
        python3 - << 'EOF'
        import urllib.parse
        import subprocess
        import os

        processed_links = []
        counter = 1

        if os.path.exists("raw_links.txt"):
            with open("raw_links.txt", "r") as f:
                lines = f.read().splitlines()

            for line in lines:
                line = line.strip()
                if not line.startswith("vless://"):
                    continue
                
                try:
                    parsed = urllib.parse.urlparse(line)
                    query_params = urllib.parse.parse_qs(parsed.query)
                    
                    host_with_port = parsed.netloc.split("@")[-1]
                    host = host_with_port.split(":")[0]

                    ping_check = subprocess.run(
                        ["ping", "-c", "1", "-W", "2", host],
                        stdout=subprocess.DEVNULL,
                        stderr=subprocess.DEVNULL
                    )
                    
                    if ping_check.returncode != 0:
                        continue
                        
                    security = query_params.get("security", [""])
                    security = security[0].lower() if security else ""
                    
                    transport = query_params.get("type", [""])
                    transport = transport[0].lower() if transport else ""
                    
                    if security == "reality" and transport in ["grpc", "tcp", "http", "splithttp"]:
                        clean_vless_part = line.split("#")[0]
                        
                        new_name_text = f"🇪🇺 📶LTE | ТЕСТ #{counter}"
                        new_name_encoded = urllib.parse.quote(new_name_text)
                        
                        processed_links.append(f"{clean_vless_part}#{new_name_encoded}")
                        counter += 1
                except Exception:
                    continue

        with open("temp.txt", "a") as f:
            for link in processed_links:
                f.write(link + "\n")
        EOF

        cat temp.txt | base64 -w 0 > links.txt
        rm temp.txt raw_links.txt

    # ТУТ ИСПРАВЛЕН EMAIL БОТА НА СТАНДАРТНЫЙ
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add links.txt
        git diff-index --quiet HEAD || git commit -m "Filter live nodes and rename to LTE format [skip ci]"
        git push
