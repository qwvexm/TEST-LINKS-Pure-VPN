name: Hourly Link Update

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Download, filter live nodes and encode
      run: |
        echo "#profile-update-interval: 1" > temp.txt
        echo "#hide-settings: 1" >> temp.txt
        echo "#profile-title: 🪐 Pure VPN | ТЕСТ" >> temp.txt
        echo "#profile-web-page-url: https://qwvexm.ru" >> temp.txt
        echo "#announce: base64:4oS577iPINCt0YLQviDRgtC10YHRgtC+0LLRi9C5INGB0LXRgNCy0LXRgCwg0YHQtdGA0LLQtdGA0LAg0LHRg9C00YPRgiDQvtCx0L3QvtCy0LvRj9GC0YzRgdGPINC60LDQttC00YvQuSDRh9Cw0YEu" >> temp.txt
        
        curl -sL "https://githubusercontent.com" > raw_links.txt
        curl -sL "https://githubusercontent.com" >> raw_links.txt
        
        python3 - << 'EOF'
        import urllib.parse
        import socket
        import os

        processed_links = []
        counter = 1

        if os.path.exists("raw_links.txt"):
            with open("raw_links.txt", "r") as f:
                lines = f.read().splitlines()

            for line in lines:
                line = line.strip()
                if not line.startswith("vless://"):
                    continue
                
                try:
                    # Быстрая проверка текста на наличие Reality и нужного транспорта
                    if "security=reality" not in line.lower():
                        continue
                    
                    has_valid_transport = False
                    for t in ["type=grpc", "type=tcp", "type=http", "type=splithttp"]:
                        if t in line.lower():
                            has_valid_transport = True
                            break
                    if not has_valid_transport:
                        continue

                    # Разбираем структуру ссылки через надежный парсер
                    parsed = urllib.parse.urlparse(line)
                    host_with_port = parsed.netloc.split("@")[-1]
                    
                    # Четко разделяем домен/IP и порт
                    if ":" in host_with_port:
                        host, port_str = host_with_port.split(":")
                        port = int(port_str)
                    else:
                        host = host_with_port
                        port = 443  # стандартный порт по умолчанию

                    # Проверяем доступность порта сервера (таймаут 2 секунды)
                    # Это встроенный метод Python, он никогда не зависнет
                    sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    sock.settimeout(2.0)
                    result = sock.connect_ex((host, port))
                    sock.close()
                    
                    # Если порт закрыт или сервер недоступен, connect_ex вернет число не равное 0
                    if result != 0:
                        continue
                        
                    # Отрезаем старое название и клеим новое
                    clean_vless_part = line.split("#")[0]
                    new_name_text = f"🇪🇺 📶LTE | ТЕСТ #{counter}"
                    new_name_encoded = urllib.parse.quote(new_name_text)
                    
                    processed_links.append(f"{clean_vless_part}#{new_name_encoded}")
                    counter += 1
                except Exception:
                    continue

        with open("temp.txt", "a") as f:
            for link in processed_links:
                f.write(link + "\n")
        EOF

        cat temp.txt | base64 -w 0 > links.txt
        rm temp.txt raw_links.txt

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add links.txt
        git diff-index --quiet HEAD || git commit -m "Filter live nodes and rename to LTE format [skip ci]"
        git push
