name: Hourly Link Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download, format and encode whole file
      run: |
        echo "#profile-update-interval: 1" > temp.txt
        echo "#hide-settings: 1" >> temp.txt
        echo "#profile-title: 🪐 Pure VPN | ТЕСТ" >> temp.txt
        echo "#subscription-userinfo: expire=1782853200" >> temp.txt
        echo "#support-url: https://qwvexm.ru" >> temp.txt
        echo "#announce: base64:4oS577iPINCi0LXRgdGC0L7QstGL0LUg0YHQtdGA0LLQtdGA0LAKCnB1cmUtdnBuLnF3dmV4bS5ydQ==" >> temp.txt
        
		curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" | tail -n +7 | head -n 35 >> temp.txt
        curl -sL "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" | tail -n +5 | head -n 34 >> temp.txt
        
        awk '
        BEGIN {
            counter = 1
        }
        /vless:\/\// {
            split($0, parts, "#")
            print parts[1] "#🇷🇺 🛜 WIFI • ТЕСТ #" counter
            counter++
        }
        ' raw.txt >> temp.txt
        
        cat temp.txt | base64 -w 0 > links.txt
        
        rm temp.txt raw.txt

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add links.txt
        git diff-index --quiet HEAD || git commit -m "Automated links update with WIFI layout [skip ci]"
        git push
